site_name: theorycrafting
site_url: https://serendipper.github.io/theorycrafting
repo_url: https://github.com/Serendipper/theorycrafting
edit_uri: ""

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - search.suggest
    - search.highlight
    - toc.integrate

plugins:
  - search

markdown_extensions:
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true

extra_javascript:
  - javascripts/checklist.js

extra_css:
  - stylesheets/checklist.css

nav:
  - Home: index.md
  - Gaming:
      - Wind Waker — Heart Pieces: gaming/the-wind-waker-heart-pieces.md
      - Twilight Princess — Heart Pieces: gaming/twilight-princess-heart-pieces.md
  - Automation:
      - Personal automation with Cursor: automation/personal-automation-with-cursor.md
  - OpenClaw Polybot:
      - Roadmap: openclaw_polybot/roadmap.md
  - Day Trader Bot:
      - Sense — TipRanks: day-trader-bot/sense/tiprank/index.md
